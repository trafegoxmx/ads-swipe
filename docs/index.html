<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ads Swipe File</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #17181c;
      --surface2: #1f2027;
      --border: #2a2b33;
      --accent: #6c63ff;
      --text: #e8e8f0;
      --muted: #7b7c8e;
      --hot: #ff4d4d;
      --warm: #ff9900;
      --cool: #22c55e;
      --new: #38bdf8;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      position: sticky; top: 0;
      background: rgba(13,13,15,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .meta { font-size: 0.75rem; color: var(--muted); }
    .meta strong { color: var(--text); }
    .keyword-tag {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 10px;
      font-size: 0.72rem; color: var(--muted);
    }
    .keyword-tag span { color: var(--accent); font-weight: 600; }

    /* ── Controls ── */
    .controls {
      padding: 12px 32px; display: flex; align-items: center;
      gap: 14px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 240px; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .search-wrap input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 7px 10px 7px 32px; border-radius: 8px;
      font-size: 0.83rem; outline: none; transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .control-group { display: flex; align-items: center; gap: 8px; }
    label { font-size: 0.77rem; color: var(--muted); white-space: nowrap; }
    input[type="range"] {
      -webkit-appearance: none; width: 100px; height: 4px;
      background: var(--border); border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: var(--accent); border-radius: 50%; cursor: pointer;
    }
    input[type="number"] {
      width: 64px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 5px 8px; border-radius: 6px;
      font-size: 0.82rem; text-align: center;
    }
    select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: 6px;
      font-size: 0.82rem; cursor: pointer;
    }
    .count-badge {
      background: var(--accent); color: #fff;
      font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; margin-left: auto;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px; padding: 24px 32px;
    }

    /* ── Card — Facebook style ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: flex; flex-direction: column;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(108,99,255,0.13);
    }

    /* Card header: avatar + page name + sponsored */
    .card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px 10px;
    }
    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      object-fit: cover; display: block;
      border: 2px solid var(--border);
      background: var(--surface2);
    }
    .avatar-placeholder {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--muted); flex-shrink: 0;
    }
    .temp-dot {
      position: absolute; bottom: 0; right: 0;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--surface);
    }
    .dot-hot  { background: var(--hot); }
    .dot-warm { background: var(--warm); }
    .dot-cool { background: var(--cool); }
    .dot-new  { background: var(--new); }

    .card-header-info { flex: 1; min-width: 0; }
    .page-name {
      font-weight: 600; font-size: 0.87rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sponsored-row {
      display: flex; align-items: center; gap: 5px;
      margin-top: 2px;
    }
    .sponsored-label { font-size: 0.7rem; color: var(--muted); }
    .temp-badge {
      font-size: 0.65rem; font-weight: 700; padding: 1px 6px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.2px;
    }
    .temp-hot  { background: rgba(255,77,77,0.15);  color: var(--hot);  border: 1px solid rgba(255,77,77,0.3); }
    .temp-warm { background: rgba(255,153,0,0.15);  color: var(--warm); border: 1px solid rgba(255,153,0,0.3); }
    .temp-cool { background: rgba(34,197,94,0.12);  color: var(--cool); border: 1px solid rgba(34,197,94,0.25); }
    .temp-new  { background: rgba(56,189,248,0.12); color: var(--new);  border: 1px solid rgba(56,189,248,0.25); }

    /* Creative image */
    .card-creative {
      width: 100%; aspect-ratio: 1/1;
      background: var(--surface2); overflow: hidden;
      position: relative;
    }
    .card-creative img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.3s;
    }
    .card:hover .card-creative img { transform: scale(1.04); }
    .card-creative-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: var(--muted);
    }

    /* Stats row */
    .card-stats {
      display: flex; gap: 6px; flex-wrap: wrap;
      padding: 10px 14px 6px;
    }
    .stat {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 8px;
      font-size: 0.71rem; color: var(--muted);
    }
    .stat strong { color: var(--text); font-weight: 600; }
    .stat.hl { border-color: var(--accent); color: var(--accent); }
    .stat.hl strong { color: var(--accent); }

    /* Card footer */
    .card-footer {
      padding: 6px 14px 13px;
      display: flex; gap: 7px;
    }
    .btn {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      font-size: 0.72rem; color: var(--muted); text-decoration: none;
      border: 1px solid var(--border); padding: 6px 8px; border-radius: 7px;
      background: none; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.copied { border-color: var(--cool); color: var(--cool); }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.78); backdrop-filter: blur(6px);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; max-width: 480px; width: 100%; overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Modal header */
    .modal-card-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    .modal-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--border);
      background: var(--surface2); flex-shrink: 0;
    }
    .modal-avatar-placeholder {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--surface2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: var(--muted); flex-shrink: 0;
    }
    .modal-page-info { flex: 1; }
    .modal-page-name { font-weight: 700; font-size: 0.95rem; }
    .modal-sponsored { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .modal-close {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); width: 28px; height: 28px; border-radius: 50%;
      font-size: 0.9rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }

    /* Modal creative */
    .modal-creative {
      width: 100%; aspect-ratio: 1/1;
      background: var(--surface2); overflow: hidden;
    }
    .modal-creative img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-creative-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; color: var(--muted);
    }

    .modal-body { padding: 16px 18px 20px; display: flex; flex-direction: column; gap: 12px; }
    .modal-rows { display: flex; flex-direction: column; gap: 6px; }
    .modal-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--surface2); border-radius: 8px; font-size: 0.81rem;
    }
    .modal-row .lbl { color: var(--muted); }
    .modal-row .val { color: var(--text); font-weight: 500; }
    .modal-actions { display: flex; gap: 8px; }
    .btn-primary {
      flex: 1; padding: 10px; background: var(--accent); color: #fff;
      border: none; border-radius: 9px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary {
      padding: 10px 16px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text);
      border-radius: 9px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: border-color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-secondary.copied { border-color: var(--cool); color: var(--cool); }

    /* ── Empty ── */
    .empty { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--muted); }
    .empty h2 { font-size:1.05rem; margin-bottom:8px; }
    .empty p { font-size:0.83rem; }

    @media (max-width:600px) {
      header, .controls, .grid { padding-left:16px; padding-right:16px; }
      .search-wrap { max-width:100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ads<span>swipe</span></div>
  <div class="header-right">
    <div class="keyword-tag">keyword: <span id="keyword">—</span></div>
    <div class="meta">Updated <strong id="lastUpdate">—</strong></div>
    <div class="meta" id="meta">Loading...</div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Search page name..." />
  </div>
  <div class="control-group">
    <label>Min creatives</label>
    <input type="range" id="slider" min="0" max="1000" value="100" step="10" />
    <input type="number" id="minInput" value="100" min="0" />
  </div>
  <div class="control-group">
    <label>Sort by</label>
    <select id="sort">
      <option value="recent">Most recent</option>
      <option value="creatives">Most creatives</option>
      <option value="oldest">Oldest first</option>
      <option value="days">Days active</option>
    </select>
  </div>
  <span class="count-badge" id="count">0 ads</span>
</div>

<div class="grid" id="grid"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-card-header">
      <div id="modalAvatar"></div>
      <div class="modal-page-info">
        <div class="modal-page-name" id="modalPageName">—</div>
        <div class="modal-sponsored">Sponsored · <span id="modalTempLabel"></span></div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-creative" id="modalCreative"></div>
    <div class="modal-body">
      <div class="modal-rows" id="modalRows"></div>
      <div class="modal-actions">
        <a class="btn-primary" id="modalLink" href="#" target="_blank" rel="noopener">↗ Open on Facebook</a>
        <button class="btn-secondary" id="modalCopy">Copy ID</button>
      </div>
    </div>
  </div>
</div>

<script>
  let allAds = [];
  let renderedAds = [];

  function escHtml(s) {
    return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function tempInfo(ad) {
    const c = ad.creativeCount ?? 0;
    const d = ad.daysActive ?? 999;
    if (c >= 500)           return { cls:'temp-hot',  dot:'dot-hot',  label:'🔥 Hot' };
    if (c >= 200)           return { cls:'temp-warm', dot:'dot-warm', label:'⚡ Warm' };
    if (d <= 30 && c >= 100) return { cls:'temp-new',  dot:'dot-new',  label:'✨ New' };
    return                         { cls:'temp-cool', dot:'dot-cool', label:'✅ Active' };
  }

  async function loadAds() {
    try {
      const res = await fetch('data/ads.json');
      allAds = await res.json();
    } catch { allAds = []; }
    document.getElementById('keyword').textContent = 'pink salt trick';
    document.getElementById('lastUpdate').textContent =
      new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    render();
  }

  function render() {
    const min    = parseInt(document.getElementById('minInput').value) || 0;
    const sort   = document.getElementById('sort').value;
    const search = document.getElementById('search').value.trim().toLowerCase();

    let ads = allAds.filter(a => (a.creativeCount??0) >= min);
    if (search) ads = ads.filter(a => (a.pageName??'').toLowerCase().includes(search));

    if (sort==='creatives') ads.sort((a,b)=>b.creativeCount-a.creativeCount);
    else if (sort==='recent') ads.sort((a,b)=>(a.daysActive??9999)-(b.daysActive??9999));
    else if (sort==='oldest') ads.sort((a,b)=>(b.daysActive??0)-(a.daysActive??0));
    else if (sort==='days')   ads.sort((a,b)=>(a.daysActive??9999)-(b.daysActive??9999));

    renderedAds = ads;
    document.getElementById('count').textContent = `${ads.length} ads`;
    document.getElementById('meta').textContent  = `${allAds.length} scraped · ${ads.length} shown`;

    const grid = document.getElementById('grid');
    if (!ads.length) {
      grid.innerHTML = `<div class="empty"><h2>No ads found</h2><p>Try lowering the minimum or clearing the search.</p></div>`;
      return;
    }

    grid.innerHTML = ads.map((ad, i) => {
      const { cls, dot, label } = tempInfo(ad);

      const avatar = ad.avatarUrl
        ? `<img class="avatar" src="${escHtml(ad.avatarUrl)}" alt="" />`
        : `<div class="avatar-placeholder">👤</div>`;

      const creative = ad.creativeImageUrl
        ? `<img src="${escHtml(ad.creativeImageUrl)}" loading="lazy" alt="" />`
        : `<div class="card-creative-placeholder">🖼</div>`;

      return `
        <div class="card" onclick="openModal(${i})">
          <div class="card-header">
            <div class="avatar-wrap">
              ${avatar}
              <span class="temp-dot ${dot}"></span>
            </div>
            <div class="card-header-info">
              <div class="page-name" title="${escHtml(ad.pageName)}">${escHtml(ad.pageName||'Unknown page')}</div>
              <div class="sponsored-row">
                <span class="sponsored-label">Sponsored</span>
                <span class="temp-badge ${cls}">${label}</span>
              </div>
            </div>
          </div>
          <div class="card-creative">${creative}</div>
          <div class="card-stats">
            <div class="stat hl"><strong>${ad.creativeCount??'?'}</strong> creatives</div>
            <div class="stat"><strong>${ad.daysActive??'?'}</strong> days active</div>
            ${ad.startDate?`<div class="stat">Since <strong>${escHtml(ad.startDate)}</strong></div>`:''}
          </div>
          <div class="card-footer">
            <a class="btn" href="${escHtml(ad.adUrl||'#')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ View ad</a>
            <button class="btn" onclick="event.stopPropagation();copyId(this,'${escHtml(ad.libraryId||'')}')">Copy ID</button>
          </div>
        </div>`;
    }).join('');
  }

  function copyId(btn, id) {
    if (!id) return;
    navigator.clipboard.writeText(id).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('copied'); }, 1500);
    });
  }

  function openModal(i) {
    const ad = renderedAds[i]; if (!ad) return;
    const { cls, label } = tempInfo(ad);

    // Avatar
    document.getElementById('modalAvatar').innerHTML = ad.avatarUrl
      ? `<img class="modal-avatar" src="${escHtml(ad.avatarUrl)}" alt="" />`
      : `<div class="modal-avatar-placeholder">👤</div>`;

    document.getElementById('modalPageName').textContent = ad.pageName || 'Unknown page';
    document.getElementById('modalTempLabel').innerHTML = `<span class="temp-badge ${cls}">${label}</span>`;

    // Creative
    document.getElementById('modalCreative').innerHTML = ad.creativeImageUrl
      ? `<img src="${escHtml(ad.creativeImageUrl)}" alt="" />`
      : `<div class="modal-creative-placeholder">🖼</div>`;

    document.getElementById('modalRows').innerHTML = [
      ['Library ID',  ad.libraryId||'—'],
      ['Creatives',   ad.creativeCount!=null ? `${ad.creativeCount} ads` : '—'],
      ['Started',     ad.startDate||'—'],
      ['Days active', ad.daysActive!=null ? `${ad.daysActive} days` : '—'],
    ].map(([k,v])=>`
      <div class="modal-row">
        <span class="lbl">${k}</span>
        <span class="val">${escHtml(String(v))}</span>
      </div>`).join('');

    document.getElementById('modalLink').href = ad.adUrl || '#';

    const cb = document.getElementById('modalCopy');
    cb.textContent = 'Copy ID'; cb.classList.remove('copied');
    cb.onclick = () => navigator.clipboard.writeText(ad.libraryId||'').then(()=>{
      cb.textContent='Copied!'; cb.classList.add('copied');
      setTimeout(()=>{ cb.textContent='Copy ID'; cb.classList.remove('copied'); },1500);
    });

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target.id==='modalOverlay') closeModal(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

  const slider = document.getElementById('slider');
  const minInput = document.getElementById('minInput');
  slider.addEventListener('input',   ()=>{ minInput.value=slider.value; render(); });
  minInput.addEventListener('input', ()=>{ slider.value=minInput.value; render(); });
  document.getElementById('sort').addEventListener('change', render);
  document.getElementById('search').addEventListener('input', render);

  loadAds();
</script>
</body>
</html>
